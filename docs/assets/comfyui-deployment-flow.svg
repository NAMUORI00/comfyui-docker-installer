<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ComfyUI Docker Installer deployment flow</title>
  <desc id="desc">Internal LAN browser reaches Caddy on port 8188, Caddy applies Basic Auth and proxies to ComfyUI on the Docker internal network. ComfyUI uses NVIDIA GPUs and persistent host data mounts.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263238"/>
    </marker>
    <marker id="dash-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#546e7a"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2933; }
      .h1 { font-size: 32px; font-weight: 700; }
      .h2 { font-size: 24px; font-weight: 700; }
      .label { font-size: 20px; font-weight: 700; }
      .body { font-size: 17px; }
      .small { font-size: 14px; fill: #425466; }
      .ko { font-size: 18px; font-weight: 700; }
      .en { font-size: 14px; fill: #52616b; }
      .zone { fill: #f7fbff; stroke: #72a7d8; stroke-width: 2; }
      .lan { fill: #f1fbf5; stroke: #4f9d69; stroke-width: 2; }
      .security { fill: #f2f7ff; stroke: #2f80d1; stroke-width: 2; }
      .service { fill: #f3fbf6; stroke: #4a9b68; stroke-width: 2; }
      .gpu { fill: #fff9e9; stroke: #c78b18; stroke-width: 2; }
      .data { fill: #fffaf0; stroke: #c99a4a; stroke-width: 2; }
      .box { rx: 14; ry: 14; }
      .arrow { stroke: #263238; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #546e7a; stroke-width: 3; stroke-dasharray: 12 10; fill: none; marker-end: url(#dash-arrow); }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="60" y="58" class="h1">ComfyUI Docker Installer: 내부망 보안 배포 흐름</text>
  <text x="60" y="88" class="en">Secure internal-LAN deployment flow with Caddy Basic Auth, Docker isolation, NVIDIA GPU runtime, and persistent host data.</text>
  <rect x="55" y="150" width="210" height="300" class="box lan"/>
  <text x="160" y="205" text-anchor="middle" class="label">내부망 사용자</text>
  <text x="160" y="232" text-anchor="middle" class="en">Internal LAN browser</text>
  <rect x="100" y="260" width="120" height="90" rx="12" fill="#ffffff" stroke="#607d8b" stroke-width="4"/>
  <line x1="100" y1="285" x2="220" y2="285" stroke="#607d8b" stroke-width="4"/>
  <circle cx="120" cy="273" r="6" fill="#90a4ae"/>
  <circle cx="142" cy="273" r="6" fill="#90a4ae"/>
  <circle cx="164" cy="273" r="6" fill="#90a4ae"/>
  <text x="160" y="390" text-anchor="middle" class="ko">브라우저 접속</text>
  <text x="160" y="418" text-anchor="middle" class="small">http://172.18.102.9:8188</text>
  <rect x="420" y="150" width="255" height="300" class="box security"/>
  <text x="548" y="205" text-anchor="middle" class="label">Caddy 컨테이너</text>
  <text x="548" y="232" text-anchor="middle" class="en">Only host-published service</text>
  <rect x="498" y="265" width="100" height="100" rx="22" fill="#1565c0"/>
  <rect x="523" y="312" width="50" height="38" rx="6" fill="#e3f2fd"/>
  <path d="M533 313 v-22 c0-22 30-22 30 0 v22" stroke="#e3f2fd" stroke-width="10" fill="none"/>
  <text x="548" y="394" text-anchor="middle" class="ko">Basic Auth 적용</text>
  <text x="548" y="421" text-anchor="middle" class="small">0.0.0.0:8188</text>
  <rect x="720" y="125" width="520" height="350" class="box zone"/>
  <text x="980" y="172" text-anchor="middle" class="h2">Docker 내부 네트워크</text>
  <text x="980" y="198" text-anchor="middle" class="en">Docker internal network</text>
  <rect x="765" y="255" width="190" height="130" class="box" fill="#f7f2ff" stroke="#7e57c2" stroke-width="2"/>
  <text x="860" y="310" text-anchor="middle" class="label">Reverse Proxy</text>
  <text x="860" y="340" text-anchor="middle" class="body">caddy -&gt; comfyui</text>
  <text x="860" y="365" text-anchor="middle" class="small">comfyui:8188</text>
  <rect x="1030" y="235" width="165" height="185" class="box service"/>
  <rect x="1072" y="270" width="82" height="70" rx="15" fill="#00695c"/>
  <text x="1113" y="316" text-anchor="middle" font-size="40" font-weight="700" fill="#ffffff">&gt;_</text>
  <text x="1113" y="370" text-anchor="middle" class="label">ComfyUI</text>
  <text x="1113" y="398" text-anchor="middle" class="small">container: 8188</text>
  <rect x="1325" y="180" width="210" height="230" class="box gpu"/>
  <text x="1430" y="230" text-anchor="middle" class="label">NVIDIA RTX A6000</text>
  <text x="1430" y="257" text-anchor="middle" class="en">3 GPUs detected</text>
  <rect x="1365" y="292" width="130" height="55" rx="6" fill="#263238"/>
  <circle cx="1472" cy="319" r="22" fill="#455a64"/>
  <circle cx="1472" cy="319" r="11" fill="#ffc857"/>
  <line x1="1376" y1="350" x2="1426" y2="350" stroke="#263238" stroke-width="10"/>
  <line x1="265" y1="305" x2="420" y2="305" class="arrow"/>
  <line x1="675" y1="305" x2="765" y2="305" class="arrow"/>
  <line x1="955" y1="305" x2="1030" y2="305" class="arrow"/>
  <line x1="1195" y1="305" x2="1325" y2="305" class="arrow"/>
  <rect x="325" y="620" width="950" height="190" class="box data"/>
  <text x="800" y="665" text-anchor="middle" class="h2">호스트 영구 데이터: ./data</text>
  <text x="800" y="694" text-anchor="middle" class="en">Persistent host data survives image rebuilds and container recreation.</text>
  <rect x="380" y="720" width="120" height="52" rx="10" fill="#ffffff" stroke="#c99a4a"/>
  <text x="440" y="753" text-anchor="middle" class="body">models</text>
  <rect x="520" y="720" width="155" height="52" rx="10" fill="#ffffff" stroke="#c99a4a"/>
  <text x="598" y="753" text-anchor="middle" class="body">custom_nodes</text>
  <rect x="695" y="720" width="125" height="52" rx="10" fill="#ffffff" stroke="#c99a4a"/>
  <text x="758" y="753" text-anchor="middle" class="body">python</text>
  <rect x="840" y="720" width="140" height="52" rx="10" fill="#ffffff" stroke="#c99a4a"/>
  <text x="910" y="753" text-anchor="middle" class="body">input/output</text>
  <rect x="1000" y="720" width="105" height="52" rx="10" fill="#ffffff" stroke="#c99a4a"/>
  <text x="1053" y="753" text-anchor="middle" class="body">user</text>
  <rect x="1125" y="720" width="105" height="52" rx="10" fill="#ffffff" stroke="#c99a4a"/>
  <text x="1178" y="753" text-anchor="middle" class="body">caddy</text>
  <path d="M1113 420 V570 H440 V720" class="dash"/>
  <path d="M1113 420 V570 H598 V720" class="dash"/>
  <path d="M1113 420 V570 H758 V720" class="dash"/>
  <path d="M1113 420 V570 H910 V720" class="dash"/>
  <path d="M1113 420 V570 H1053 V720" class="dash"/>
  <path d="M548 450 V570 H1178 V720" class="dash"/>
  <rect x="55" y="645" width="215" height="135" rx="10" fill="#ffffff" stroke="#b0bec5"/>
  <line x1="85" y1="690" x2="145" y2="690" class="arrow"/>
  <text x="165" y="696" class="body">요청 흐름</text>
  <text x="165" y="718" class="small">Request flow</text>
  <line x1="85" y1="748" x2="145" y2="748" class="dash"/>
  <text x="165" y="754" class="body">영구 마운트</text>
  <text x="165" y="776" class="small">Persistent mount</text>
</svg>
