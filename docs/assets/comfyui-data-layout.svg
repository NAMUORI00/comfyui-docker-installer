<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ComfyUI Docker Installer persistent data layout</title>
  <desc id="desc">The data directory stores models, custom nodes, Python user packages, input, output, user settings, and Caddy auth configuration outside the container.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #1f2933; }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 15px; fill: #52616b; }
      .section { font-size: 23px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .body { font-size: 15px; }
      .small { font-size: 13px; fill: #52616b; }
      .host { fill: #fffaf0; stroke: #c99a4a; stroke-width: 2; }
      .container { fill: #f5fbff; stroke: #6fa8dc; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #c99a4a; stroke-width: 1.6; }
      .mount { stroke: #455a64; stroke-width: 2.2; stroke-dasharray: 9 7; marker-end: url(#arrow); fill: none; }
      .note { fill: #f1f8e9; stroke: #74a66a; stroke-width: 1.5; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="60" y="58" class="title">ComfyUI 데이터는 컨테이너가 아니라 ./data에 남습니다</text>
  <text x="60" y="88" class="subtitle">ComfyUI runtime data is stored on the host under ./data, so rebuilds and container recreation do not erase user files.</text>
  <rect x="80" y="145" width="1440" height="250" rx="16" class="container"/>
  <text x="800" y="188" text-anchor="middle" class="section">Docker Compose 마운트 대상 / Container mount targets</text>
  <rect x="150" y="230" width="185" height="92" rx="12" fill="#ffffff" stroke="#6fa8dc"/>
  <text x="242" y="267" text-anchor="middle" class="label">/opt/comfyui-models</text>
  <text x="242" y="295" text-anchor="middle" class="small">extra_model_paths.yaml</text>
  <rect x="365" y="230" width="210" height="92" rx="12" fill="#ffffff" stroke="#6fa8dc"/>
  <text x="470" y="267" text-anchor="middle" class="label">/opt/ComfyUI/custom_nodes</text>
  <text x="470" y="295" text-anchor="middle" class="small">plugin source</text>
  <rect x="605" y="230" width="190" height="92" rx="12" fill="#ffffff" stroke="#6fa8dc"/>
  <text x="700" y="267" text-anchor="middle" class="label">/opt/comfyui-python</text>
  <text x="700" y="295" text-anchor="middle" class="small">PYTHONUSERBASE</text>
  <rect x="825" y="230" width="165" height="92" rx="12" fill="#ffffff" stroke="#6fa8dc"/>
  <text x="908" y="267" text-anchor="middle" class="label">input / output</text>
  <text x="908" y="295" text-anchor="middle" class="small">workflows, results</text>
  <rect x="1020" y="230" width="155" height="92" rx="12" fill="#ffffff" stroke="#6fa8dc"/>
  <text x="1098" y="267" text-anchor="middle" class="label">/opt/ComfyUI/user</text>
  <text x="1098" y="295" text-anchor="middle" class="small">settings, DB</text>
  <rect x="1205" y="230" width="245" height="92" rx="12" fill="#ffffff" stroke="#6fa8dc"/>
  <text x="1328" y="267" text-anchor="middle" class="label">/etc/caddy/Caddyfile</text>
  <text x="1328" y="295" text-anchor="middle" class="small">Basic Auth proxy config</text>
  <rect x="80" y="480" width="1440" height="345" rx="16" class="host"/>
  <text x="800" y="525" text-anchor="middle" class="section">호스트 상대 경로 ./data / Host-relative persistent directory</text>
  <rect x="130" y="575" width="300" height="195" rx="14" class="card"/>
  <text x="280" y="612" text-anchor="middle" class="label">models/</text>
  <text x="280" y="637" text-anchor="middle" class="small">checkpoints, loras, vae, text_encoders...</text>
  <text x="162" y="672" class="body">checkpoints/</text>
  <text x="162" y="704" class="body">loras/</text>
  <text x="162" y="736" class="body">vae/</text>
  <text x="292" y="672" class="body">controlnet/</text>
  <text x="292" y="704" class="body">diffusers/</text>
  <text x="292" y="736" class="body">vae_approx/</text>
  <rect x="462" y="575" width="175" height="195" rx="14" class="card"/>
  <text x="550" y="612" text-anchor="middle" class="label">custom_nodes/</text>
  <text x="550" y="644" text-anchor="middle" class="body">커스텀 노드</text>
  <text x="550" y="669" text-anchor="middle" class="small">plugin source</text>
  <text x="550" y="724" text-anchor="middle" class="small">requirements.txt scan</text>
  <rect x="670" y="575" width="185" height="195" rx="14" class="card"/>
  <text x="762" y="612" text-anchor="middle" class="label">python/</text>
  <text x="762" y="644" text-anchor="middle" class="body">패키지 저장소</text>
  <text x="762" y="670" text-anchor="middle" class="small">pip install --user</text>
  <text x="762" y="724" text-anchor="middle" class="small">survives rebuilds</text>
  <rect x="888" y="575" width="150" height="195" rx="14" class="card"/>
  <text x="963" y="612" text-anchor="middle" class="label">input/</text>
  <text x="963" y="644" text-anchor="middle" class="body">입력 파일</text>
  <text x="963" y="670" text-anchor="middle" class="small">workflows, images</text>
  <rect x="1070" y="575" width="150" height="195" rx="14" class="card"/>
  <text x="1145" y="612" text-anchor="middle" class="label">output/</text>
  <text x="1145" y="644" text-anchor="middle" class="body">생성 결과</text>
  <text x="1145" y="670" text-anchor="middle" class="small">images, videos, logs</text>
  <rect x="1252" y="575" width="120" height="195" rx="14" class="card"/>
  <text x="1312" y="612" text-anchor="middle" class="label">user/</text>
  <text x="1312" y="644" text-anchor="middle" class="body">설정</text>
  <text x="1312" y="670" text-anchor="middle" class="small">comfyui.db</text>
  <rect x="1404" y="575" width="90" height="195" rx="14" class="card"/>
  <text x="1449" y="612" text-anchor="middle" class="label">caddy/</text>
  <text x="1449" y="644" text-anchor="middle" class="body">Auth</text>
  <text x="1449" y="670" text-anchor="middle" class="small">auth.hash</text>
  <path d="M242 322 V575" class="mount"/>
  <path d="M470 322 V575" class="mount"/>
  <path d="M700 322 V575" class="mount"/>
  <path d="M908 322 V575" class="mount"/>
  <path d="M1098 322 V575" class="mount"/>
  <path d="M1328 322 V575" class="mount"/>
  <rect x="260" y="815" width="1080" height="55" rx="12" class="note"/>
  <text x="800" y="840" text-anchor="middle" class="label">핵심: 설치/재빌드/컨테이너 재생성은 이미지를 바꿔도 ./data의 사용자 파일을 보존합니다.</text>
  <text x="800" y="862" text-anchor="middle" class="small">Key point: rebuilds change containers and images, not the host-owned persistent data directory.</text>
</svg>
