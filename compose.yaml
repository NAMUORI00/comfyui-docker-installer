services:
  caddy:
    image: caddy:2-alpine
    container_name: ${CADDY_CONTAINER_NAME:-comfyui-caddy}
    restart: unless-stopped
    depends_on:
      - comfyui
    ports:
      - "${COMFYUI_BIND_HOST:-0.0.0.0}:${COMFYUI_HOST_PORT:-8188}:8188"
    volumes:
      - ${COMFYUI_DATA_DIR}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMFYUI_BASE_IMAGE: ${COMFYUI_BASE_IMAGE:-pytorch/pytorch:2.4.1-cuda12.1-cudnn9-runtime}
        COMFYUI_REF: ${COMFYUI_REF:-master}
        COMFYUI_UID: ${COMFYUI_UID:-1000}
        COMFYUI_GID: ${COMFYUI_GID:-1000}
    image: ${COMFYUI_IMAGE:-comfyui-a6000:local}
    container_name: ${COMFYUI_CONTAINER_NAME:-comfyui-a6000}
    restart: unless-stopped
    user: "${COMFYUI_USER_SPEC:-1000:1000}"
    expose:
      - "8188"
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      PYTHONUSERBASE: /opt/comfyui-python
      PATH: /opt/comfyui-python/bin:/usr/local/nvidia/bin:/usr/local/cuda/bin:/opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ${COMFYUI_DATA_DIR}/models:/opt/comfyui-models
      - ./extra_model_paths.yaml:/opt/ComfyUI/extra_model_paths.yaml:ro
      - ${COMFYUI_DATA_DIR}/input:/opt/ComfyUI/input
      - ${COMFYUI_DATA_DIR}/output:/opt/ComfyUI/output
      - ${COMFYUI_DATA_DIR}/custom_nodes:/opt/ComfyUI/custom_nodes
      - ${COMFYUI_DATA_DIR}/user:/opt/ComfyUI/user
      - ${COMFYUI_DATA_DIR}/python:/opt/comfyui-python
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
